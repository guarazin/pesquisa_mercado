<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Soft shadow & Glow behind the fruit -->
  <circle cx="256" cy="256" r="240" fill="url(#bg-gradient)" />
  
  <!-- Outer border -->
  <circle cx="256" cy="256" r="236" stroke="#ffffff" stroke-width="8" opacity="0.9" />

  <!-- Leaves in background -->
  <!-- Left leaf -->
  <path d="M120 280 C100 200, 180 140, 240 180 C200 240, 160 280, 120 280 Z" fill="#10b981" />
  <!-- Right leaf -->
  <path d="M392 280 C412 200, 332 140, 272 180 C312 240, 352 280, 392 280 Z" fill="#059669" />
  <!-- Center leaf -->
  <path d="M256 120 C210 170, 210 250, 256 280 C302 250, 302 170, 256 120 Z" fill="#34d399" />
  
  <!-- Guarana Fruits (Grouped in center) -->
  <!-- Left Fruit -->
  <g transform="translate(-40, 30)">
    <circle cx="220" cy="280" r="70" fill="url(#fruit-red)" filter="url(#drop-shadow)" />
    <!-- White Eye -->
    <circle cx="220" cy="280" r="35" fill="#ffffff" />
    <!-- Black Seed -->
    <circle cx="228" cy="272" r="20" fill="#0f172a" />
    <!-- Shine reflection -->
    <circle cx="223" cy="265" r="7" fill="#ffffff" />
  </g>

  <!-- Right Fruit -->
  <g transform="translate(40, 30)">
    <circle cx="292" cy="280" r="70" fill="url(#fruit-red)" filter="url(#drop-shadow)" />
    <!-- White Eye -->
    <circle cx="292" cy="280" r="35" fill="#ffffff" />
    <!-- Black Seed -->
    <circle cx="284" cy="272" r="20" fill="#0f172a" />
    <!-- Shine reflection -->
    <circle cx="279" cy="265" r="7" fill="#ffffff" />
  </g>

  <!-- Middle/Top Fruit (Main) -->
  <g transform="translate(0, -10)">
    <circle cx="256" cy="250" r="85" fill="url(#fruit-red-bright)" filter="url(#drop-shadow)" />
    <!-- White Eye -->
    <circle cx="256" cy="250" r="42" fill="#ffffff" />
    <!-- Black Seed -->
    <circle cx="264" cy="242" r="24" fill="#0f172a" />
    <!-- Shine reflection -->
    <circle cx="258" cy="234" r="8" fill="#ffffff" />
  </g>

  <!-- Definitions -->
  <defs>
    <!-- Background Gradient (Emerald to Teal) -->
    <linearGradient id="bg-gradient" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>

    <!-- Red Fruit Gradients -->
    <radialGradient id="fruit-red" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="50%" stop-color="#dc2626" />
      <stop offset="100%" stop-color="#991b1b" />
    </radialGradient>

    <radialGradient id="fruit-red-bright" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#f87171" />
      <stop offset="40%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#b91c1c" />
    </radialGradient>

    <!-- Subtle Drop Shadow Filter -->
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>
</svg>